<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Book a consultation — Elevé</title><meta name="description" content="Book a free consultation with the Elevé design studio.">
<meta property="og:title" content="Book a consultation — Elevé"><meta name="theme-color" content="#17181b">
<link rel="icon" href="/favicon.svg"><link rel="manifest" href="/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="elevate.css">
<style>
 body{margin:0;background:#edeff2;color:#17181b;font-family:"Inter",system-ui,sans-serif}
 header{padding:1.4rem 1.6rem;border-bottom:1px solid rgba(23,24,27,.12);display:flex;justify-content:space-between;align-items:center}
 header a.logo{font-family:"JetBrains Mono",monospace;letter-spacing:.3em;text-decoration:none;color:#17181b;border:1px solid #17181b;padding:.35rem .6rem;font-size:.8rem}
 header nav a{color:#3c3e44;text-decoration:none;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;margin-left:1.2rem}
 main{max-width:640px;margin:0 auto;padding:3.5rem 1.6rem 6rem}
 h1{font-family:"Playfair Display",serif;font-size:clamp(2rem,6vw,3rem);font-weight:600;margin:0}
 .sub{color:#6b6f76;margin:.6rem 0 2.4rem}
 form{background:#f6f7f9;border:1px solid #17181b;padding:1.8rem}
 label{display:block;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#6b6f76;margin:.2rem 0 .4rem}
 input,textarea,select{width:100%;font:inherit;font-size:.92rem;color:#17181b;background:#fff;border:1px solid #d7d9de;padding:.6rem .7rem;outline:none;margin-bottom:1rem;box-sizing:border-box}
 .row{display:flex;gap:1rem}.row>div{flex:1}
 button{font:inherit;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;padding:.8rem 1.2rem;border:1px solid #17181b;background:#17181b;color:#fff;cursor:pointer;width:100%}
 .status{margin-top:1rem;font-size:.85rem;min-height:1.1em}
 .alt{margin-top:1.6rem;font-size:.85rem;color:#6b6f76;text-align:center}
</style><link rel="canonical" href="/book.html">
</head>
<body>
<header><a class="logo" href="/index.html">ELEVÉ</a><nav><a href="/gallery.html">Gallery</a><a href="/materials.html">Materials</a><a href="/builder.html">Builder</a></nav></header>
<main>
 <p style="letter-spacing:.3em;text-transform:uppercase;font-size:.7rem;color:#8b8f97">Let's talk</p>
 <h1>Book a consultation</h1>
 <p class="sub">A free 30-minute call to discuss your space, timeline and budget. Pick a preferred date — we'll confirm by email.</p>
 <form id="bookForm">
   <div class="row"><div><label for="bName">Name</label><input id="bName" required placeholder="Your name"></div><div><label for="bEmail">Email</label><input id="bEmail" type="email" required placeholder="you@email.com"></div></div>
   <div class="row"><div><label for="bDate">Preferred date</label><input id="bDate" type="date" required></div><div><label for="bTime">Preferred time</label><select id="bTime"><option>Morning</option><option>Afternoon</option><option>Evening</option></select></div></div>
   <label for="bNote">About your project (optional)</label><textarea id="bNote" rows="4" placeholder="Rooms, style, timeline, budget…"></textarea>
   <button type="submit" id="bBtn">Request consultation</button>
   <p class="status" id="bStatus" role="status" aria-live="polite"></p>
 </form>
 <p class="alt">Prefer email? Write to <a href="mailto:creative@sentientbyelysian.com">creative@sentientbyelysian.com</a>.</p>
</main>
<script src="site.js"></script>
<script src="chrome.js"></script>
<script>
(function(){
  var base=(location.protocol==="http:"||location.protocol==="https:")?"":"http://localhost:4000";
  var d=document.getElementById("bDate"); if(d){ var t=new Date(Date.now()+86400000); d.min=t.toISOString().slice(0,10); }
  var form=document.getElementById("bookForm");
  form.addEventListener("submit",function(e){ e.preventDefault();
    var btn=document.getElementById("bBtn"), st=document.getElementById("bStatus");
    var body={ name:val("bName"), email:val("bEmail"), date:val("bDate"), time:val("bTime"), note:val("bNote") };
    function val(id){ return (document.getElementById(id).value||"").trim(); }
    btn.disabled=true; btn.textContent="Sending…";
    fetch(base+"/api/consult",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
      .then(function(r){return r.ok?r.json():r.json().then(function(x){throw x;});})
      .then(function(){ form.reset(); btn.textContent="Requested ✓"; st.style.color="#17181b"; st.textContent="Thank you — we'll confirm your consultation by email shortly."; })
      .catch(function(err){ btn.disabled=false; btn.textContent="Request consultation"; st.style.color="#c0392b"; st.textContent=(err&&err.error)||"Could not send — start the server, or email us directly."; });
  });
  // hoist val()
  function val(id){ return (document.getElementById(id).value||"").trim(); }
  window.val=val;
})();
</script>
</body></html>
