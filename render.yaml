services:
  - type: web
    name: eleve
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: SECRET
        generateValue: true
      - key: SLACK_WEBHOOK
        sync: false
      - key: STRIPE_SECRET
        sync: false
      - key: DB_FILE
        value: /var/data/db.json
      - key: BACKUP_DIR
        value: /var/data/backups
    disk:
      name: eleve-data
      mountPath: /var/data
      sizeGB: 1
